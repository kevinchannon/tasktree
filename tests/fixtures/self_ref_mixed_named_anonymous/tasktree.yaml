tasks:
  process:
    inputs:
      - config: named.txt
      - anon.txt
    outputs:
      - result: output.txt
      - debug.log
    cmd: python3 -c "open('{{ self.outputs.result }}', 'w').write(open('{{ self.inputs.config }}').read() + open('anon.txt').read()); open('debug.log', 'w').write('Processed\n')"
