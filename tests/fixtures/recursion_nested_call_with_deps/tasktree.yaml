tasks:
  dep-task:
    outputs: [outputs/dep.txt]
    cmd: python3 -c "import pathlib; pathlib.Path('outputs').mkdir(exist_ok=True); open('outputs/dep.txt', 'w').write('Dependency\n')"

  parent:
    deps: [dep-task]
    outputs: [outputs/parent.txt]
    cmd: |
      python3 -c "import pathlib; pathlib.Path('outputs').mkdir(exist_ok=True); open('outputs/parent.txt', 'w').write('Parent\n')"
      tt child

  child:
    outputs: [outputs/child.txt]
    cmd: python3 -c "import pathlib; pathlib.Path('outputs').mkdir(exist_ok=True); open('outputs/child.txt', 'w').write('Child\n')"
