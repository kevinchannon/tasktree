tasks:
  dep:
    outputs: [dep.txt]
    cmd: python3 -c "open('dep.txt', 'w').write('dependency\n')"

  child:
    deps: [dep]
    outputs: [child.txt]
    cmd: python3 -c "open('child.txt', 'w').write('child\n')"

  parent:
    outputs: [parent.txt]
    cmd: |
      python3 -m tasktree.cli child
      python3 -c "open('parent.txt', 'w').write('parent\n')"
