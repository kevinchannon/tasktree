tasks:
  base:
    outputs:
      - lib: "out/libbase.a"
    cmd: python3 -c "import pathlib; pathlib.Path('out').mkdir(exist_ok=True); open('out/libbase.a', 'w').write('base-lib\n')"

  middleware:
    deps: [base]
    outputs:
      - lib: "out/libmiddleware.a"
    cmd: python3 -c "open('out/libmiddleware.a', 'w').write('middleware uses {{ dep.base.outputs.lib }}\n')"

  app:
    deps: [middleware]
    cmd: python3 -c "print('App uses {{ dep.middleware.outputs.lib }}'); print(open('{{ dep.middleware.outputs.lib }}').read(), end='')"
