tasks:
  generate:
    outputs:
      - config: "generated/config.txt"
    cmd: |
      mkdir -p generated
      echo "config-data" > generated/config.txt

  build:
    deps: [generate]
    outputs:
      - bundle: "dist/app.js"
    cmd: |
      mkdir -p dist
      cat {{ dep.generate.outputs.config }} > dist/app.js
      echo " bundled" >> dist/app.js

  deploy:
    deps: [build]
    cmd: |
      echo "Deploying {{ dep.build.outputs.bundle }}"
      cat {{ dep.build.outputs.bundle }}
