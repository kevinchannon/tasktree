tasks:
  generate:
    args:
      - format: { default: "json" }
      - pretty: { type: bool, default: false }
    outputs:
      - "data.{{arg.format}}"
    cmd: python3 -c "open('data.{{arg.format}}', 'w').write('{{arg.format}},pretty={{arg.pretty}}\n')"

  process:
    deps:
      - generate:
          format: xml
          pretty: true
    outputs: [processed.log]
    cmd: python3 -c "open('processed.log', 'w').write('Processing XML\n')"
