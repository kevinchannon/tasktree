tasks:
  compile:
    args:
      - target
    outputs:
      - "compiled-{{arg.target}}.o"
    cmd: python3 -c "open('compiled-{{arg.target}}.o', 'w').write('Compiling for {{arg.target}}\n')"

  link:
    deps:
      - compile: [x86]
      - compile: [arm]
    outputs:
      - linked.bin
    cmd: python3 -c "open('linked.bin', 'w').write('Linking all targets\n'); open('linked.bin', 'a').write(open('compiled-x86.o').read() + open('compiled-arm.o').read())"
