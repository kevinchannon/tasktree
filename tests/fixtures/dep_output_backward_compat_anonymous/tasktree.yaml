tasks:
  build:
    outputs: ["dist/bundle.js", "dist/bundle.css"]
    cmd: python3 -c "import pathlib; pathlib.Path('dist').mkdir(exist_ok=True); open('dist/bundle.js', 'w').write('js\n'); open('dist/bundle.css', 'w').write('css\n')"

  deploy:
    deps: [build]
    cmd: python3 -c "print('Deploying'); print(open('dist/bundle.js').read(), end=''); print(open('dist/bundle.css').read(), end='')"
