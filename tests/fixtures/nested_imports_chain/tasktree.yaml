imports:
  - file: middleware.yaml
    as: mid

tasks:
  build:
    deps: [mid.prepare, mid.base.config]
    outputs: [build.txt]
    cmd: python3 -c "open('build.txt', 'w').write('step 5\n')"

  deploy:
    deps: [build]
    outputs: [deploy.txt]
    cmd: python3 -c "open('deploy.txt', 'w').write('step 6\n')"
