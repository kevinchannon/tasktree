tasks:
  setup:
    outputs: [setup.log]
    cmd: python3 -c "open('setup.log', 'w').write('setup\n')"

  build:
    deps: [setup]
    outputs: [build.log]
    cmd: python3 -c "open('build.log', 'w').write('build\n')"

  test:
    deps: [setup]
    outputs: [test.log]
    cmd: python3 -c "open('test.log', 'w').write('test\n')"

  deploy:
    deps: [build, test]
    outputs: [deploy.log]
    cmd: python3 -c "open('deploy.log', 'w').write('deploy\n')"
