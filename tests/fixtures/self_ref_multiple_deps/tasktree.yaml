tasks:
  prep:
    outputs:
      - config: config.txt
    cmd: python3 -c "open('{{ self.outputs.config }}', 'w').write('config\n')"

  buildA:
    deps: [prep]
    outputs:
      - moduleA: moduleA.js
    cmd: python3 -c "open('{{ self.outputs.moduleA }}', 'w').write('moduleA\n')"

  buildB:
    deps: [prep]
    outputs:
      - moduleB: moduleB.js
    cmd: python3 -c "open('{{ self.outputs.moduleB }}', 'w').write('moduleB\n')"

  bundle:
    deps: [buildA, buildB]
    outputs:
      - bundle: app.js
    cmd: python3 -c "open('{{ self.outputs.bundle }}', 'w').write(open('{{ dep.buildA.outputs.moduleA }}').read() + open('{{ dep.buildB.outputs.moduleB }}').read())"
