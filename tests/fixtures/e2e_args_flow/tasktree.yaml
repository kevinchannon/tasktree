tasks:
  deploy:
    args:
      - environment
      - region: { type: str, default: us-west-1 }
      - port: { type: int, default: 8080 }
      - debug: { type: bool, default: false }
    outputs: [deploy.log]
    cmd: python3 -c "open('deploy.log', 'w').write('env={{ arg.environment }} region={{ arg.region }} port={{ arg.port }} debug={{ arg.debug }}\n')"
