tasks:
  generate:
    outputs:
      - id_file: "gen/build-id.txt"
    cmd: python3 -c "import pathlib; pathlib.Path('gen').mkdir(exist_ok=True); open('gen/build-id.txt', 'w').write('12345\n')"

  build:
    deps: [generate]
    outputs:
      - artifact: "dist/app-build.tar.gz"
    cmd: python3 -c "import pathlib; pathlib.Path('dist').mkdir(exist_ok=True); bid=open('{{ dep.generate.outputs.id_file }}').read().strip(); open('dist/app-build.tar.gz', 'w').write('artifact-' + bid + '\nUsing ID from: {{ dep.generate.outputs.id_file }}\n')"
