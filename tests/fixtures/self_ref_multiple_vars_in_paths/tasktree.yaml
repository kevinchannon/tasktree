variables:
  project: "myapp"
  version: "2"

tasks:
  process:
    inputs:
      - data: "projects/{{ var.project }}/v{{ var.version }}/data.txt"
    outputs:
      - result: "{{ var.project }}-v{{ var.version }}-output.txt"
    cmd: python3 -c "import shutil; shutil.copy('{{ self.inputs.data }}', '{{ self.outputs.result }}')"
