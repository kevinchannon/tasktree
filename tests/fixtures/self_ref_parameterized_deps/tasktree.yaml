tasks:
  compile:
    args: [platform]
    outputs:
      - binary: bin-{{ arg.platform }}.exe
    cmd: python3 -c "open('{{ self.outputs.binary }}', 'w').write('binary for {{ arg.platform }}\n')"

  package:
    args: [platform]
    deps:
      - compile:
          platform: "{{ arg.platform }}"
    inputs:
      - installer: package.nsi
    outputs:
      - setup: setup-{{ arg.platform }}.exe
    cmd: python3 -c "open('{{ self.outputs.setup }}', 'w').write(open('{{ self.inputs.installer }}').read() + open('{{ dep.compile.outputs.binary }}').read())"
