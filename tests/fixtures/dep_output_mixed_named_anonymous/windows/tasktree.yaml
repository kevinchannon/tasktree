tasks:
  compile:
    outputs:
      - binary: "build/app"
      - "build/app.debug"
      - symbols: "build/app.sym"
    cmd: |
      mkdir build
      echo binary > build/app
      echo debug > build/app.debug
      echo symbols > build/app.sym

  package:
    deps: [compile]
    cmd: |
      echo Packaging {{ dep.compile.outputs.binary }}
      echo Symbols: {{ dep.compile.outputs.symbols }}
