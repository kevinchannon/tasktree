tasks:
  e:
    outputs: [e.txt]
    cmd: python3 -c "open('e.txt', 'w').write('e\n')"

  d:
    outputs: [d.txt]
    cmd: |
      python3 -m tasktree.cli e
      python3 -c "open('d.txt', 'w').write('d\n')"

  c:
    outputs: [c.txt]
    cmd: |
      python3 -m tasktree.cli d
      python3 -c "open('c.txt', 'w').write('c\n')"

  b:
    outputs: [b.txt]
    cmd: |
      python3 -m tasktree.cli c
      python3 -c "open('b.txt', 'w').write('b\n')"

  a:
    outputs: [a.txt]
    cmd: |
      python3 -m tasktree.cli b
      python3 -c "open('a.txt', 'w').write('a\n')"
