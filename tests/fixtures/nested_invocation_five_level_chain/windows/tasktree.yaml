tasks:
  e:
    outputs: [e.txt]
    cmd: echo e>e.txt

  d:
    outputs: [d.txt]
    cmd: |
      python -m tasktree.cli e
      echo d>d.txt

  c:
    outputs: [c.txt]
    cmd: |
      python -m tasktree.cli d
      echo c>c.txt

  b:
    outputs: [b.txt]
    cmd: |
      python -m tasktree.cli c
      echo b>b.txt

  a:
    outputs: [a.txt]
    cmd: |
      python -m tasktree.cli b
      echo a>a.txt
