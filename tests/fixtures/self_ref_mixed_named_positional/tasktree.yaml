tasks:
  process:
    inputs:
      - config: named.txt
      - anon.txt
    outputs:
      - result: output.txt
      - debug.log
    cmd: python3 -c "open('{{ self.outputs.result }}', 'w').write(open('{{ self.inputs.config }}').read() + open('{{ self.inputs.1 }}').read()); open('{{ self.outputs.1 }}', 'w').write('Processed\n')"
