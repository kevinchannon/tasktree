tasks:
  build:
    outputs:
      - artifact: dist/app.js
    cmd: python3 -c "import pathlib; pathlib.Path('dist').mkdir(exist_ok=True); open('{{ self.outputs.artifact }}', 'w').write('app code\n')"

  package:
    deps: [build]
    inputs:
      - config: package.json
    outputs:
      - tarball: release.tar.gz
    cmd: python3 -c "import tarfile; tf=tarfile.open('{{ self.outputs.tarball }}', 'w:gz'); tf.add('{{ self.inputs.config }}'); tf.add('{{ dep.build.outputs.artifact }}'); tf.close()"
