variables:
  version: "1.2.3"
  app_name: "myapp"

tasks:
  build:
    outputs: [build.log]
    cmd: python3 -c "open('build.log', 'w').write('Building {{ var.app_name }} v{{ var.version }}\n')"

  deploy:
    deps: [build]
    outputs: [deploy.log]
    cmd: python3 -c "open('deploy.log', 'w').write('Deploying {{ var.app_name }} v{{ var.version }}\n')"
