tasks:
  generate:
    outputs:
      - filename: data.json
    cmd: python3 -c "open('{{ self.outputs.filename }}', 'w').write('{' + chr(34) + 'version' + chr(34) + ':' + chr(34) + '1.0' + chr(34) + '}' + chr(10))"

  process:
    deps: [generate]
    inputs:
      - source: "{{ dep.generate.outputs.filename }}"
    outputs:
      - result: processed.txt
    cmd: python3 -c "import shutil; shutil.copy('{{ self.inputs.source }}', '{{ self.outputs.result }}')"
