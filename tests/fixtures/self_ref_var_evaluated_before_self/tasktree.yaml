variables:
  env: "staging"

tasks:
  deploy:
    inputs:
      - bundle: "{{ var.env }}/app.js"
    outputs:
      - deployed: "{{ var.env }}/deployed.js"
    cmd: python3 -c "import shutil, pathlib; pathlib.Path('{{ self.outputs.deployed }}').parent.mkdir(parents=True, exist_ok=True); shutil.copy('{{ self.inputs.bundle }}', '{{ self.outputs.deployed }}')"
