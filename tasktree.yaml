# yaml-language-server: $schema=schema/tasktree-schema.json
runners:
  default: bash-strict
  bash-strict:
    shell:
      cmd: bash
      preamble: set -euo pipefail
  tt-test:
    dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/host_tmp
    args:
      run: ["--group-add", "0"]
    env_vars:
      HOME: /host_tmp
      TMPDIR: /host_tmp

tasks:
  dev-setup:
    desc: Install development dependencies
    inputs: [ "pyproject.toml", ".python-version" ]
    cmd: uv sync --extra dev

  check:
    desc: Run all checks (tests and build)
    deps: [test, build, check-lint, check-format]
    cmd: echo "✓ All checks passed!"

  run-tests:
    desc: "Run a specific test suite"
    args:
      - suite: { choices: [ "unit", "integration", "e2e"] }
      - sync: { type: bool, default: False }
    inputs: [ "src/**/*.py", "tests/{{ arg.suite }}/*.py" ]
    cmd: |
      if [[ "{{ arg.sync | lower }}" != "false" ]]; then
        uv sync --extra dev
      fi
      PYTHONPATH=tests uv run pytest tests/{{ arg.suite }}

  unit-test:
    desc: "Run unit tests"
    args:
      - sync: { type: bool, default: False }
    deps:
      - run-tests: [ "unit" ]
    cmd: "echo unit tests pass"

  integration-test:
    desc: "Run integration tests"
    args:
      - sync: { type: bool, default: False }
    deps:
      - run-tests: [ "integration" ]
    cmd: "echo Integration tests pass"

  e2e-test:
    desc: "Run end-to-end tests"
    args:
      - sync: { type: bool, default: False }
    deps:
      - run-tests: [ "e2e" ]
    cmd: "echo End-to-end tests pass"

  test:
    desc: "Run all test suites"
    run_in: tt-test
    cmd: |
      uv sync --extra dev

      uv run tt unit-test sync=FALSE
      uv run tt integration-test sync=FALSE
      uv run tt e2e-test sync=FALSE

  coverage:
    desc: Run tests with coverage check
    inputs: [src/**/*.py, tests/**/*.py]
    cmd: uv sync --extra dev && PYTHONPATH=tests uv run pytest --cov=src/tasktree --cov-report=term-missing

  check-format:
    inputs: [src/**/*.py, tests/**/*.py]
    cmd: uv format --check
  
  check-lint:
    inputs: [src/**/*.py, tests/**/*.py]
    cmd: ruff check src tests

  fix:
    deps: [fix-format, fix-lint]
    cmd: echo "✓ All fixes complete!"

  fix-format:
    inputs: [src/**/*.py, tests/**/*.py]
    cmd: uv format

  fix-lint:
    inputs: [src/**/*.py, tests/**/*.py]
    cmd: ruff check --fix src tests

  build:
    desc: Build distribution packages (wheel and sdist)
    deps: [test]
    inputs: [src/**/*.py, pyproject.toml, README.md]
    outputs: [dist/*.whl, dist/*.tar.gz]
    cmd: uv build

  clean:
    desc: Remove build artifacts and cache files
    cmd: |
      rm -rf dist/ build/ *.egg-info .venv
      rm -rf .pytest_cache
      find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true